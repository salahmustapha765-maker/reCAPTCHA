        html, body {

            color: #2c2c2e;

        .bg-container {

            padding: 20px;
            opacity: 0.2;
            cursor: default !important;
        }

        /* Modern Cloudflare Overlay Box */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 99999;
            cursor: default !important;
        }
        
        .modal-box {
            background: #ffffff;
            border-radius: 14px;
            box-shadow: 0 10px 35px rgba(0, 0, 0, 0.12);
            width: 90%;
            max-width: 420px;
            position: relative;
            text-align: left;
            overflow: hidden;
            border: 1px solid rgba(0, 0, 0, 0.05);
            padding: 28px;
            animation: slideUp 0.35s cubic-bezier(0.16, 1, 0.3, 1);
            cursor: default !important;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Cloudflare Fake Header Style */
        .modal-header {
            display: flex;
            align-items: center;
            margin-bottom: 18px;
            cursor: default !important;
        }
        .cloudflare-logo {
            width: 24px;
            height: 24px;
            margin-right: 12px;
            background: #f48120;
            clip-path: polygon(25% 5%, 75% 5%, 100% 50%, 75% 95%, 25% 95%, 0% 50%);
        }
        .modal-title { 
            font-size: 16px; 
            font-weight: 600; 
            color: #1c1c1e; 
        }

        .modal-text {
            font-size: 14.5px;
            color: #48484a;
            line-height: 1.5;
            margin-bottom: 24px;
            cursor: text !important; /* Cursor mta' ktiba natural */
        }

        /* --- CLOUDFLARE WIDGET STYLE --- */
        .verification-widget {
            background-color: #f9f9fb;
            border: 1px solid #e5e5ea;
            border-radius: 8px;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            user-select: none;
            /* 🎯 Hna barka n7ottou dynamic pointer kima l-asli 🎯 */
            cursor: pointer !important;
        }
        .widget-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        
        /* Fake animated checker */
        .widget-spinner {
            width: 22px;
            height: 22px;
            border: 2px solid rgba(0, 0, 0, 0.05);
            border-radius: 50%;
            border-left-color: #f48120;
            animation: spin 0.8s linear infinite;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .widget-text {
            font-size: 14.5px;
            color: #1c1c1e;
            font-weight: 500;
        }
        .widget-right {
            text-align: right;
        }
        .widget-right-text {
            font-size: 9px;
            color: #8e8e93;
            display: block;
            line-height: 1.2;
        }
    </style>
</head>
